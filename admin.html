<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Auto — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --accent: #111; --white: #fff; --off: #f7f7f5; --border: #e8e8e4; --muted: #888880; --text: #111; --radius: 10px; --radius-lg: 16px; --font: 'system-ui', sans-serif; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--off); color: var(--text); font-size: 15px; -webkit-font-smoothing: antialiased; }

  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px; width: 100%; max-width: 380px; }
  .login-title { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  .login-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .field input { padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; width: 100%; }
  .field input:focus { outline: none; border-color: var(--accent); }
  .btn { width: 100%; padding: 12px; background: var(--accent); color: var(--white); border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; }
  .btn:hover { background: #333; }
  .login-err { display: none; font-size: 13px; color: #8b1a1a; margin-top: 12px; }
  .login-err.show { display: block; }

  .app { display: none; }
  .app.show { display: block; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .topbar-logo { font-size: 16px; font-weight: 500; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .topbar-shop { font-size: 13px; color: var(--muted); }
  .logout-btn { font-size: 13px; color: var(--muted); cursor: pointer; background: none; border: none; padding: 6px 12px; border-radius: var(--radius); }
  .logout-btn:hover { background: var(--off); color: var(--text); }

  .main { padding: 28px 24px; max-width: 900px; margin: 0 auto; }
  .tabs { display: flex; gap: 4px; background: #ececea; padding: 4px; border-radius: var(--radius); width: fit-content; margin-bottom: 28px; }
  .tab { padding: 8px 18px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--muted); }
  .tab.active { background: var(--white); color: var(--text); border: 1px solid var(--border); }
  .panel { display: none; }
  .panel.active { display: block; }

  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .section-title { font-size: 18px; font-weight: 500; }
  .refresh-btn { font-size: 13px; color: var(--muted); cursor: pointer; background: var(--white); border: 1px solid var(--border); padding: 7px 14px; border-radius: var(--radius); }

  .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 12px; overflow: hidden; }
  .card-header { padding: 16px 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .card-name { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
  .card-details { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .card-time { font-size: 12px; color: var(--muted); white-space: nowrap; margin-top: 2px; }
  .card-actions { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--off); display: flex; gap: 8px; flex-wrap: wrap; }

  .action-btn { padding: 7px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--white); color: var(--text); }
  .action-btn:hover { background: var(--off); }
  .action-btn.confirm { background: #111; color: #fff; border-color: #111; }
  .action-btn.confirm:hover { background: #333; }
  .action-btn.deny { border-color: #f5c0c0; color: #8b1a1a; background: #fff0f0; }
  .action-btn.deny:hover { background: #ffe0e0; }

  .badge { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 500; }
  .badge-new { background: #e8f0fe; color: #1a4a8b; }
  .badge-confirmed { background: #f0faf4; color: #1a6b3a; }
  .badge-denied { background: #fff0f0; color: #8b1a1a; }
  .badge-in { background: #fff8e1; color: #8a6000; }
  .badge-ready { background: #f0faf4; color: #1a6b3a; }

  .new-ticket { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 24px; }
  .new-ticket-title { font-size: 14px; font-weight: 500; margin-bottom: 16px; }
  .ticket-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ticket-field { display: flex; flex-direction: column; gap: 5px; }
  .ticket-field label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .ticket-field input, .ticket-field select { padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; color: var(--text); background: var(--white); width: 100%; }
  .ticket-field input:focus, .ticket-field select:focus { outline: none; border-color: var(--accent); }
  .add-ticket-btn { margin-top: 14px; padding: 10px 20px; background: var(--accent); color: var(--white); border: none; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; }

  .empty { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; }
  .loading { text-align: center; padding: 32px; color: var(--muted); font-size: 14px; }
  .msg-toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 12px 24px; border-radius: var(--radius); font-size: 14px; z-index: 999; }
  .msg-toast.show { display: block; }

  @media (max-width: 600px) {
    .ticket-form { grid-template-columns: 1fr; }
    .main { padding: 20px 16px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-title">Aurora Auto Repair</div>
    <div class="login-sub">Admin panel — Neil's dashboard</div>
    <div class="field"><label>Password</label><input type="password" id="pw-input" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')checkLogin()"></div>
    <button class="btn" onclick="checkLogin()">Sign in</button>
    <div class="login-err" id="login-err">Wrong password. Try again.</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-logo">Aurora Auto — Admin</div>
    <div class="topbar-right">
      <span class="topbar-shop">aurora-auto-repair</span>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('bookings')">Bookings</button>
      <button class="tab" onclick="switchTab('repairs')">Repair tracker</button>
      <button class="tab" onclick="switchTab('calendar')">Calendar</button>
    </div>

    <!-- BOOKINGS PANEL -->
    <div class="panel active" id="panel-bookings">
      <div class="section-head">
        <div class="section-title">Incoming bookings</div>
        <button class="refresh-btn" onclick="loadBookings()">Refresh</button>
      </div>
      <div id="bookings-list"><div class="loading">Loading bookings...</div></div>
    </div>

    <!-- REPAIRS PANEL -->
    <div class="panel" id="panel-repairs">
      <div class="section-head">
        <div class="section-title">Repair tracker</div>
        <button class="refresh-btn" onclick="loadTickets()">Refresh</button>
      </div>
      <div class="new-ticket">
        <div class="new-ticket-title">Add a new repair ticket</div>
        <div class="ticket-form">
          <div class="ticket-field"><label>Customer name</label><input type="text" id="t-name" placeholder="Mike Torres"></div>
          <div class="ticket-field"><label>Vehicle</label><input type="text" id="t-vehicle" placeholder="2019 Toyota Camry"></div>
          <div class="ticket-field"><label>Service</label><input type="text" id="t-service" placeholder="Brake service"></div>
          <div class="ticket-field"><label>ETA</label><input type="text" id="t-eta" placeholder="3:30 PM today"></div>
        </div>
        <button class="add-ticket-btn" onclick="addTicket()">Create ticket</button>
      </div>
      <div id="tickets-list"><div class="loading">Loading tickets...</div></div>
    </div>

    <!-- CALENDAR PANEL -->
    <div class="panel" id="panel-calendar">
      <div class="section-head">
        <div class="section-title">Appointment calendar</div>
        <button class="refresh-btn" onclick="loadCalendar()">Refresh</button>
      </div>

      <div class="new-ticket" style="margin-bottom:24px">
        <div class="new-ticket-title">Block off time / add manual appointment</div>
        <div class="ticket-form">
          <div class="ticket-field"><label>Customer name</label><input type="text" id="cal-name" placeholder="Mike Torres or 'Blocked'"></div>
          <div class="ticket-field"><label>Service</label><input type="text" id="cal-service" placeholder="Oil change"></div>
          <div class="ticket-field"><label>Date</label><input type="date" id="cal-date"></div>
          <div class="ticket-field"><label>Start time</label><input type="time" id="cal-start"></div>
          <div class="ticket-field"><label>End time</label><input type="time" id="cal-end"></div>
        </div>
        <button class="add-ticket-btn" onclick="addCalendarEntry()">Add to calendar</button>
      </div>

      <div id="cal-date-picker" style="margin-bottom:20px;display:flex;align-items:center;gap:12px">
        <button onclick="changeCalDate(-1)" style="padding:7px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--white);cursor:pointer;font-size:14px">←</button>
        <div id="cal-date-label" style="font-size:15px;font-weight:500;min-width:160px;text-align:center"></div>
        <button onclick="changeCalDate(1)" style="padding:7px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--white);cursor:pointer;font-size:14px">→</button>
      </div>

      <div id="calendar-view"><div class="loading">Loading calendar...</div></div>
    </div>
  </div>
</div>

<div class="msg-toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://jmksxvvbgxqcijrbdwos.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impta3N4dnZiZ3hxY2lqcmJkd29zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjEzMzIsImV4cCI6MjA5MTQ5NzMzMn0.Lu6zdmKHX5lOwHWKC9C2qJEqf6qGM28ItMsstBoV5AI';
  const SHOP_ID = 'aurora-auto-repair';
  const ADMIN_PASSWORD = 'aurora2025';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  function checkLogin() {
    const pw = document.getElementById('pw-input').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('app').classList.add('show');
      loadBookings();
    } else {
      document.getElementById('login-err').classList.add('show');
    }
  }

  // Wake up Supabase on page load
  db.from('bookings').select('id').limit(1).then(() => console.log('Supabase ready'));

  function logout() {
    document.getElementById('login-wrap').style.display = 'flex';
    document.getElementById('app').classList.remove('show');
    document.getElementById('pw-input').value = '';
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['bookings','repairs','calendar'][i] === name));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    if (name === 'bookings') loadBookings();
    else if (name === 'repairs') loadTickets();
    else if (name === 'calendar') loadCalendar();
  }

  // ── CALENDAR ──
  let calViewDate = new Date();

  function changeCalDate(dir) {
    calViewDate.setDate(calViewDate.getDate() + dir);
    loadCalendar();
  }

  function formatTime12(t) {
    if (!t) return '';
    const [h, m] = t.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  async function loadCalendar() {
    const dateStr = calViewDate.toISOString().split('T')[0];
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    document.getElementById('cal-date-label').textContent = days[calViewDate.getDay()] + ', ' + dateStr;

    const { data: appts } = await db.from('appointments').select('*')
      .eq('shop_id', SHOP_ID).eq('booking_date', dateStr).order('start_time');

    const el = document.getElementById('calendar-view');
    if (!appts || appts.length === 0) {
      el.innerHTML = '<div class="empty">No appointments on this day.</div>';
      return;
    }

    el.innerHTML = appts.map(a => `
      <div class="card" style="margin-bottom:10px">
        <div class="card-header">
          <div>
            <div class="card-name">${a.customer_name || '—'} <span class="badge ${a.status === 'cancelled' ? 'badge-denied' : 'badge-confirmed'}">${a.status || 'scheduled'}</span></div>
            <div class="card-details">${a.service || '—'} · ${formatTime12(a.start_time)} – ${formatTime12(a.end_time)}</div>
          </div>
        </div>
        <div class="card-actions">
          <button class="action-btn deny" onclick="cancelAppt(${a.id})">Cancel slot</button>
        </div>
      </div>`).join('');
  }

  async function addCalendarEntry() {
    const name = document.getElementById('cal-name').value.trim();
    const service = document.getElementById('cal-service').value.trim();
    const date = document.getElementById('cal-date').value;
    const start = document.getElementById('cal-start').value;
    const end = document.getElementById('cal-end').value;
    if (!name || !date || !start || !end) { alert('Please fill in all fields.'); return; }
    const { error } = await db.from('appointments').insert([{
      customer_name: name, service, booking_date: date,
      start_time: start, end_time: end, shop_id: SHOP_ID, status: 'scheduled'
    }]);
    if (!error) {
      ['cal-name','cal-service','cal-date','cal-start','cal-end'].forEach(id => document.getElementById(id).value = '');
      toast('Added to calendar');
      calViewDate = new Date(date + 'T00:00:00');
      loadCalendar();
    }
  }

  async function cancelAppt(id) {
    if (!confirm('Cancel this appointment slot?')) return;
    await db.from('appointments').update({ status: 'cancelled' }).eq('id', id);
    toast('Slot cancelled — now available for booking');
    loadCalendar();
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function timeAgo(ts) {
    const diff = Math.floor((Date.now() - new Date(ts)) / 60000);
    if (diff < 1) return 'just now';
    if (diff < 60) return diff + 'm ago';
    if (diff < 1440) return Math.floor(diff/60) + 'h ago';
    return Math.floor(diff/1440) + 'd ago';
  }

  async function loadBookings() {
    const el = document.getElementById('bookings-list');
    el.innerHTML = '<div class="loading">Loading...</div>';
    const { data, error } = await db.from('bookings').select('*')
      .eq('shop_id', SHOP_ID).order('created_at', { ascending: false });
    if (error || !data || data.length === 0) {
      el.innerHTML = '<div class="empty">No bookings yet. Share your site link to get started.</div>'; return;
    }
    el.innerHTML = data.map(b => `
      <div class="card" id="booking-${b.id}">
        <div class="card-header">
          <div>
            <div class="card-name">${b.name || '—'} <span class="badge badge-new">New</span></div>
            <div class="card-details">
              ${b.vehicle || 'Vehicle not specified'}<br>
              ${b.service || 'Service not specified'}<br>
              ${b.phone || ''}${b.date ? ' · Requested: ' + b.date : ''}
            </div>
          </div>
          <div class="card-time">${timeAgo(b.created_at)}</div>
        </div>
        <div class="card-actions">
          <button class="action-btn confirm" onclick="confirmBooking(${b.id}, '${b.name}', '${b.vehicle}', '${b.service}', '${b.phone}', '${b.email || ''}')">Confirm & create ticket</button>
          <button class="action-btn" onclick="callCustomer('${b.phone}')">Call ${b.phone}</button>
          <button class="action-btn deny" onclick="deleteBooking(${b.id})">Remove</button>
        </div>
      </div>`).join('');
  }

  async function confirmBooking(id, name, vehicle, service, phone, email) {
    const { error } = await db.from('tickets').insert([{
      customer_name: name, vehicle, service, status: 'checked-in',
      eta: '', shop_id: SHOP_ID, customer_email: email || ''
    }]);
    if (!error) {
      await deleteBooking(id, true);
      // Send confirmation email to customer
      if (email) {
        fetch('/.netlify/functions/send-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'confirmed',
            customerName: name,
            customerEmail: email,
            vehicle, service
          })
        });
      }
      toast('Confirmed! Ticket created for ' + name);
      switchTab('repairs');
    }
  }

  async function deleteBooking(id, silent) {
    await db.from('bookings').delete().eq('id', id);
    if (!silent) { toast('Booking removed'); loadBookings(); }
  }

  function callCustomer(phone) {
    window.location.href = 'tel:' + phone.replace(/\D/g,'');
  }

  async function loadTickets() {
    const el = document.getElementById('tickets-list');
    el.innerHTML = '<div class="loading">Loading...</div>';
    const { data, error } = await db.from('tickets').select('*')
      .eq('shop_id', SHOP_ID).order('created_at', { ascending: false });
    if (error || !data || data.length === 0) {
      el.innerHTML = '<div class="empty">No active repair tickets. Create one above or confirm a booking.</div>'; return;
    }
    const statusLabels = { 'checked-in': 'Checked in', 'diagnosing': 'Diagnosing', 'in-repair': 'In repair', 'ready': 'Ready for pickup' };
    const badgeClass = { 'checked-in': 'badge-new', 'diagnosing': 'badge-in', 'in-repair': 'badge-in', 'ready': 'badge-ready' };
    el.innerHTML = data.map(t => `
      <div class="card" id="ticket-${t.id}">
        <div class="card-header">
          <div>
            <div class="card-name">${t.customer_name || '—'} <span class="badge ${badgeClass[t.status] || 'badge-new'}">${statusLabels[t.status] || t.status}</span></div>
            <div class="card-details">${t.vehicle || '—'} · ${t.service || '—'}${t.eta ? ' · ETA: ' + t.eta : ''}</div>
          </div>
          <div class="card-time">${timeAgo(t.created_at)}</div>
        </div>
        <div class="card-actions">
          <button class="action-btn" onclick="updateStatus(${t.id}, 'checked-in')">Checked in</button>
          <button class="action-btn" onclick="updateStatus(${t.id}, 'diagnosing')">Diagnosing</button>
          <button class="action-btn" onclick="updateStatus(${t.id}, 'in-repair')">In repair</button>
          <button class="action-btn confirm" onclick="updateStatus(${t.id}, 'ready')">Mark ready</button>
          <button class="action-btn" onclick="updateETA(${t.id})">Set ETA</button>
          <button class="action-btn deny" onclick="deleteTicket(${t.id})">Close ticket</button>
        </div>
      </div>`).join('');
  }

  async function addTicket() {
    const name = document.getElementById('t-name').value.trim();
    const vehicle = document.getElementById('t-vehicle').value.trim();
    const service = document.getElementById('t-service').value.trim();
    const eta = document.getElementById('t-eta').value.trim();
    if (!name || !service) { alert('Customer name and service are required.'); return; }
    const { error } = await db.from('tickets').insert([{
      customer_name: name, vehicle, service, status: 'checked-in', eta, shop_id: SHOP_ID
    }]);
    if (!error) {
      ['t-name','t-vehicle','t-service','t-eta'].forEach(id => document.getElementById(id).value = '');
      toast('Ticket created for ' + name);
      loadTickets();
    }
  }

  async function updateStatus(id, status) {
    const { error } = await db.from('tickets').update({ status }).eq('id', id);
    if (!error) {
      toast('Status updated to: ' + status.replace('-',' '));
      if (status === 'ready') {
        const { data } = await db.from('tickets').select('*').eq('id', id).single();
        if (data && data.customer_email) {
          fetch('/.netlify/functions/send-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              type: 'ready',
              customerName: data.customer_name,
              customerEmail: data.customer_email,
              vehicle: data.vehicle,
              service: data.service,
              eta: data.eta
            })
          });
        }
      }
      loadTickets();
    }
  }

  async function updateETA(id) {
    const eta = prompt('Enter estimated pickup time (e.g. "3:30 PM today"):');
    if (!eta) return;
    const { error } = await db.from('tickets').update({ eta }).eq('id', id);
    if (!error) { toast('ETA updated'); loadTickets(); }
  }

  async function deleteTicket(id) {
    if (!confirm('Close this ticket?')) return;
    await db.from('tickets').delete().eq('id', id);
    toast('Ticket closed'); loadTickets();
  }
</script>
</body>
</html>
